<div class="receipt-container">
  <h1>Transaction Receipt</h1>

  <p class="message" *ngIf="atm.lastMessage">{{ atm.lastMessage }}</p>

  <div class="balances">
    <p>Checking Balance: ${{ atm.checkingBalance.toFixed(2) }}</p>
    <p>Savings Balance: ${{ atm.savingsBalance.toFixed(2) }}</p>
  </div>

  <div class="button-group">
    <button (click)="backToMenu()">Back to Menu</button>
    <button class="exit" (click)="exit()">Exit</button>
  </div>
</div>
